<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste OpenAI API</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 50px auto;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px;
    }
    h1 { color: #FF6F91; margin-bottom: 10px; }
    p { color: rgba(255,255,255,0.7); margin-bottom: 30px; }
    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #FF6F91, #FF9671);
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover { transform: scale(1.02); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result {
      margin-top: 20px;
      padding: 20px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .success { border-color: #4ade80; }
    .error { border-color: #ef4444; }
    .code {
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 5px;
      font-family: monospace;
      font-size: 14px;
      margin-top: 10px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔑 Teste OpenAI API</h1>
    <p>Verifique se sua chave OPENAI_API_KEY está configurada corretamente</p>
    
    <button id="testBtn" onclick="testar()">Testar Agora</button>
    
    <div id="result"></div>
  </div>

  <script>
    async function testar() {
      const btn = document.getElementById('testBtn');
      const result = document.getElementById('result');
      
      btn.disabled = true;
      btn.textContent = 'Testando...';
      result.innerHTML = '';
      
      try {
        const response = await fetch('/api/test-openai');
        const data = await response.json();
        
        if (data.success) {
          result.className = 'result success';
          result.innerHTML = `
            <h3 style="color: #4ade80; margin-bottom: 10px;">✅ Chave Configurada!</h3>
            <p style="color: rgba(255,255,255,0.9); margin-bottom: 10px;">${data.message}</p>
            <div class="code">
              <div><strong>Formato:</strong> ${data.keyFormat}</div>
              <div><strong>Tamanho:</strong> ${data.keyLength} caracteres</div>
              <div><strong>Status:</strong> ${data.OPENAI_API_KEY}</div>
            </div>
            <p style="margin-top: 15px; color: #4ade80; font-weight: bold;">
              🎉 Tudo certo! Agora você pode usar a análise de fotos com IA.
            </p>
          `;
        } else {
          result.className = 'result error';
          result.innerHTML = `
            <h3 style="color: #ef4444; margin-bottom: 10px;">❌ Erro</h3>
            <p style="color: rgba(255,255,255,0.9); margin-bottom: 10px;"><strong>${data.error}</strong></p>
            <div class="code">${data.details || 'Sem detalhes'}</div>
            <p style="margin-top: 15px; color: rgba(255,255,255,0.7);">
              <strong>Como resolver:</strong><br>
              1. Configure a variável <code>OPENAI_API_KEY</code> nas configurações<br>
              2. Use sua chave da OpenAI (começa com sk-proj-...)<br>
              3. Aguarde o app reiniciar e teste novamente
            </p>
          `;
        }
      } catch (error) {
        result.className = 'result error';
        result.innerHTML = `
          <h3 style="color: #ef4444; margin-bottom: 10px;">❌ Erro de Conexão</h3>
          <p style="color: rgba(255,255,255,0.9);">${error.message}</p>
        `;
      }
      
      btn.disabled = false;
      btn.textContent = 'Testar Novamente';
    }
  </script>
</body>
</html>
